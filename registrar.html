<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="css/formato.css">
</head>
<body>


    <div id="setavoltar"> < </div> 

    <h1 id="titulo">SmartNest</h1>
    <form action="">
        <p id="welcome">Creat an Account?</p>
       
        <label for="txtname">name</label>
        <input type="name" name="txtnome" id="txtnome" required>

        <label for="txtemail">E-mail</label>
        <input type="email" name="txtemail" id="txtemail" required>

        <label for="txtpassword">Password</label>
        <input type="password" name="txtpassword" id="txtpassword" required>
        
        <div id="lembrete">
            <input type="checkbox">
            <span>I agree to the</span>
            <span>terms and services</span>
        </div>

        <input type="button" value="Login">

        <p>Or Sign in with</p>

        <div id="redes">
            
            <div id="facebook"><img src="img/facebook.png" alt="Nosso facebook"></div>
            


            <div id="google"><img src="img/google.png" alt="Nosso Canal"></div>
            


            <div id="apple"><img src="img/apple-logo.png" alt="Nossa Conta"></div>
        
        
        
        </div>



    
    </form>

    <script src="js/script.js"></script>
</body>
</html>
